name: Deploy Demo
on:
  push:
    branches: [main, master]
    paths:
      - 'demo/**'
      - '.github/workflows/demo.yml'
  workflow_dispatch:

# Apply to every job. A narrow job-only permission set can block artifact upload/download
# between build and deploy (needs actions: write at minimum for upload-artifact).
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify static demo exists
        run: test -f demo/index.html
      # v4 pairs with modern upload-artifact; no configure-pages needed for plain static HTML
      - uses: actions/upload-pages-artifact@v4
        with:
          path: demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
